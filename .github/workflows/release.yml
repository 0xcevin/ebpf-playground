name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate eBPF objects
        run: go generate ./...

      - name: Collect build metadata
        id: meta
        run: |
          echo "build_time=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> "$GITHUB_OUTPUT"
          echo "build_kernel=$(uname -r)" >> "$GITHUB_OUTPUT"
          echo "go_version=$(go version | cut -d' ' -f3)" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w \
              -X main.Version=${{ github.ref_name }} \
              -X main.BuildTime=${{ steps.meta.outputs.build_time }} \
              -X main.BuildOS=${{ matrix.goos }} \
              -X main.BuildArch=${{ matrix.goarch }} \
              -X main.BuildKernel=${{ steps.meta.outputs.build_kernel }} \
              -X main.GoVersion=${{ steps.meta.outputs.go_version }}" \
            -o ebpf-tracepoint-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build debug binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "\
              -X main.Version=${{ github.ref_name }} \
              -X main.BuildTime=${{ steps.meta.outputs.build_time }} \
              -X main.BuildOS=${{ matrix.goos }} \
              -X main.BuildArch=${{ matrix.goarch }} \
              -X main.BuildKernel=${{ steps.meta.outputs.build_kernel }} \
              -X main.GoVersion=${{ steps.meta.outputs.go_version }}" \
            -o ebpf-tracepoint-debug-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-tracepoint-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ebpf-tracepoint-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-tracepoint-debug-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ebpf-tracepoint-debug-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
